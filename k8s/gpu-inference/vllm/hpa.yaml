apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm
  namespace: gpu-inference
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference-server
  annotations:
    # Placeholder HPA — requires custom metrics adapter (e.g., Prometheus Adapter or KEDA)
    # exposing vllm:num_requests_running from VictoriaMetrics/Prometheus.
    # Connect to metrics server before enabling in production.
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: "vllm:num_requests_running"
        target:
          type: AverageValue
          averageValue: "10"
    - type: Pods
      pods:
        metric:
          name: "vllm:num_requests_waiting"
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
