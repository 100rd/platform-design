title = "Gitleaks config for platform-design"

[allowlist]
  description = "Allowlist for known false positives"
  paths = [
    '''\.terraform\.lock\.hcl''',
    '''go\.sum''',
    '''go\.mod''',
    # ArgoCD notifications config — token value is a variable reference ($slack-token),
    # not a literal secret. Actual secret lives in AWS Secrets Manager.
    '''argocd/notifications/notifications-cm\.yaml''',
    # ArgoCD notifications ExternalSecret — xoxb-... in comment is an example format only
    '''argocd/notifications/external-secret\.yaml''',
  ]
  regexTarget = "match"
  regexes = [
    # Placeholder AWS account IDs used in Terragrunt configs
    '''(?:0{12}|1{12}|2{12}|3{12}|4{12}|5{12})''',
  ]
