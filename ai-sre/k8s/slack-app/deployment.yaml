apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-slack-app
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: ai-sre-slack-app
    app.kubernetes.io/component: slack
    app.kubernetes.io/part-of: ai-sre
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-sre-slack-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-sre-slack-app
        app.kubernetes.io/component: slack
        app.kubernetes.io/part-of: ai-sre
    spec:
      serviceAccountName: ai-sre-slack-app
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: slack-app
          image: ai-sre-slack-app:latest
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
            - name: metrics
              containerPort: 9092
              protocol: TCP
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-sre-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-sre-secrets
                  key: SLACK_APP_TOKEN
            - name: ORCHESTRATOR_URL
              value: http://ai-sre-orchestrator.ai-sre-system.svc.cluster.local:8000
            - name: SLACK_CHANNEL_ALERTS
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_alerts
            - name: SLACK_CHANNEL_INCIDENTS
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_incidents
            - name: SLACK_CHANNEL_COST
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_cost
            - name: SLACK_CHANNEL_CAPACITY
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_capacity
            - name: SLACK_CHANNEL_GPU_HEALTH
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_gpu_health
            - name: SLACK_CHANNEL_CHAOS
              valueFrom:
                configMapKeyRef:
                  name: ai-sre-slack-channels
                  key: channel_chaos
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
