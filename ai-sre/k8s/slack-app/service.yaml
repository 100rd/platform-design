apiVersion: v1
kind: Service
metadata:
  name: ai-sre-slack-app
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: ai-sre-slack-app
    app.kubernetes.io/component: slack
    app.kubernetes.io/part-of: ai-sre
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-sre-slack-app
  ports:
    - name: http
      port: 8002
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9092
      targetPort: metrics
      protocol: TCP
