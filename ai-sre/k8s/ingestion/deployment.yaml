apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-ingestion
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: ai-sre-ingestion
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ai-sre
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-sre-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-sre-ingestion
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: ai-sre
    spec:
      serviceAccountName: ai-sre-orchestrator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingestion
          image: ai-sre-ingestion:latest
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: ALERT_RATE_LIMIT
              value: "100"
            - name: VICTORIAMETRICS_URL
              value: http://vmselect.monitoring.svc.cluster.local:8481
            - name: CLICKHOUSE_URL
              value: http://clickhouse.monitoring.svc.cluster.local:8123
            - name: ORCHESTRATOR_URL
              value: http://ai-sre-orchestrator.ai-sre-system.svc.cluster.local:8000
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
