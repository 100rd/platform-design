apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-mcp
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: metrics-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: ai-sre
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-mcp
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: ai-sre
    spec:
      serviceAccountName: ai-sre-orchestrator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metrics-mcp
          image: ai-sre-metrics-mcp:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: VICTORIAMETRICS_URL
              value: http://vmselect.monitoring.svc.cluster.local:8481
            - name: CLICKHOUSE_URL
              value: http://clickhouse.monitoring.svc.cluster.local:8123
            - name: CLICKHOUSE_DATABASE
              value: default
            - name: QUERY_TIMEOUT_SECONDS
              value: "30"
            - name: MAX_RESULT_ROWS
              value: "10000"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
