apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-orchestrator
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: ai-sre-orchestrator
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/part-of: ai-sre
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-sre-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-sre-orchestrator
        app.kubernetes.io/component: orchestrator
        app.kubernetes.io/part-of: ai-sre
    spec:
      serviceAccountName: ai-sre-orchestrator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator
          image: ai-sre-orchestrator:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-sre-secrets
                  key: ANTHROPIC_API_KEY
            - name: AGENT_CONFIG_PATH
              value: /etc/ai-sre/agents.yaml
            - name: CLUSTER_CONFIG_PATH
              value: /etc/ai-sre/clusters.yaml
            - name: LOG_LEVEL
              value: INFO
            - name: ADVISORY_ONLY
              value: "true"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: agent-config
              mountPath: /etc/ai-sre
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: agent-config
          configMap:
            name: ai-sre-agent-config
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
