apiVersion: v1
kind: Service
metadata:
  name: ai-sre-orchestrator
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: ai-sre-orchestrator
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/part-of: ai-sre
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: ai-sre-orchestrator
