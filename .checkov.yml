# Checkov configuration for CIS AWS Foundations Benchmark compliance
# https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html
# Adapted from infra/.checkov.yml — paths adjusted for platform-design layout
# (modules live under terraform/modules/ not root-level modules/)

framework:
  - terraform

compact: true
quiet: true

# Directory to scan — platform-design uses terraform/modules/
directory:
  - terraform/modules

skip-check:
  # Skip checks that require runtime AWS access
  - CKV_AWS_144  # S3 cross-region replication (will enable later)
  - CKV_AWS_41   # IAM Access Analyzer (tracked in SYNC_ROADMAP Phase 1.2)
  # Pre-existing issues tracked for remediation — not introduced by this branch
  - CKV_AWS_111  # KMS key policy: kms:* is required for CMK management (false positive)
  - CKV_AWS_119  # DynamoDB: pre-existing module, CMK encryption to be added separately
  - CKV_AWS_18   # S3 access logging: pre-existing in audit/logging modules (aws-config, cloudtrail)
  # auto-shutdown Lambda — intentional architectural decisions for a cost-control scheduler
  - CKV_AWS_50   # Lambda X-Ray: PassThrough is sufficient for non-critical scheduler function
  - CKV_AWS_116  # Lambda DLQ: EventBridge Scheduler has native retry; DLQ adds unnecessary complexity
  - CKV_AWS_117  # Lambda VPC: must call EC2 APIs via public endpoint; VPC adds latency with no benefit
  - CKV_AWS_115  # Lambda reserved concurrency: unreserved (-1) is correct for low-frequency scheduler
  - CKV_AWS_272  # Lambda code signing: internal automation function, not a user-facing application

soft-fail: true
