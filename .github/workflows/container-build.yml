name: Container Build & Scan

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "dns-monitor/**"
      - "failover-controller/**"
      - ".github/workflows/container-build.yml"
  pull_request:
    paths:
      - "services/**"
      - "dns-monitor/**"
      - "failover-controller/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (e.g. services/hello-world)"
        required: true

env:
  AWS_REGION: eu-west-1

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      # Runtime egress monitoring — MUST be the first step so the agent is
      # installed before anything else runs. Audit mode: observe-only, never
      # blocks the build. See .github/actions/harden-runner for the flip-to-block
      # rollout and docs/ci-cd/supply-chain-runtime.md.
      - name: Harden runner (audit)
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo 'services=["${{ github.event.inputs.service }}"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES=()
          for dir in services/*/Dockerfile dns-monitor/Dockerfile failover-controller/Dockerfile; do
            if [ -f "$dir" ]; then
              svc_dir=$(dirname "$dir")
              if git diff --name-only HEAD~1 HEAD | grep -q "^${svc_dir}/"; then
                SERVICES+=("\"${svc_dir}\"")
              fi
            fi
          done

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'services=[]' >> "$GITHUB_OUTPUT"
          else
            echo "services=[$(IFS=,; echo "${SERVICES[*]}")]" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Scan (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      # Runtime egress monitoring — first step (before checkout / AWS / buildx)
      # so it can baseline this job's outbound traffic to ECR, the GitHub API,
      # Sigstore (cosign) and the buildx cache. Audit mode: never blocks.
      - name: Harden runner (audit)
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        if: vars.AWS_ROLE_ARN != ''
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SERVICE_NAME=$(basename ${{ matrix.service }})
          SHA_SHORT=$(git rev-parse --short HEAD)
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="local"
          fi
          echo "image=${REGISTRY}/${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag-sha=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag-latest=latest" >> "$GITHUB_OUTPUT"
          echo "service-name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag-sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Show Trivy vulnerability table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag-sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag-sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      # ---------------------------------------------------------------------
      # Supply-chain hardening (platform-workflows consolidation sync):
      # generate an SBOM, push, then SIGN the pushed image by digest and attest
      # the SBOM — keyless via the job's GitHub OIDC identity. Closes the gap
      # where platform-design pushed unsigned images with no SBOM. Composite
      # actions live in .github/actions/ (mirrors platform-workflows).
      # ---------------------------------------------------------------------
      - name: Generate SBOM (Syft)
        uses: ./.github/actions/syft-sbom
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag-sha }}"
          format: spdx-json
          output-path: sbom.spdx.json
          artifact-name: sbom-${{ steps.meta.outputs.service-name }}-${{ steps.meta.outputs.tag-sha }}

      - name: Push image to ECR
        id: push-ecr
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_ROLE_ARN != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag-sha }}
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Sign image + attest SBOM (cosign keyless)
        if: steps.push-ecr.outcome == 'success' && steps.push-ecr.outputs.digest != ''
        uses: ./.github/actions/cosign-sign
        with:
          image-ref: "${{ steps.meta.outputs.image }}@${{ steps.push-ecr.outputs.digest }}"
          sbom-path: sbom.spdx.json
          sbom-type: spdxjson
