name: Well-Architected Compliance

on:
  push:
    branches: [main, feature/terragrunt]
    paths:
      - "terraform/**"
      - "checkov-policies/**"
      - ".checkov.yaml"
      - ".github/workflows/well-architected.yml"
  pull_request:
    paths:
      - "terraform/**"
      - "checkov-policies/**"
      - ".checkov.yaml"
  workflow_dispatch:

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform/modules
          quiet: true
          framework: terraform
          output_format: github_failed_only
          # NOTE: soft-fail because the codebase has known violations tracked in SYNC_ROADMAP.md Phase 1.1.
          # Switch to soft_fail: false once violations in terraform/modules/ are remediated.
          soft_fail: true
          skip_check: "CKV_TF_1,CKV_TF_2,CKV_AWS_111,CKV_AWS_119,CKV_AWS_18"
