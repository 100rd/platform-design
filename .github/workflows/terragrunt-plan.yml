name: Terragrunt Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terragrunt/**"
      - "catalog/**"
      - "terraform/modules/**"
      - ".github/workflows/terragrunt-plan.yml"

concurrency:
  group: terragrunt-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.8"
  TG_VERSION: "0.99.5"

jobs:
  # ---------------------------------------------------------------------------
  # Detect changed Terragrunt units
  # Looks for changed HCL/TF files under the multi-account/multi-region layout:
  #   terragrunt/{account}/{region}/{stack}/
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Terragrunt directories
        id: changes
        run: |
          # Find changed HCL/TF files and extract their directories.
          # Matches platform-design's multi-account layout:
          #   terragrunt/dev/eu-west-1/platform/
          #   terragrunt/staging/eu-west-1/platform/
          #   terragrunt/prod/eu-west-1/platform/
          #   catalog/units/*/
          CHANGED_DIRS=$(git diff --name-only origin/main...HEAD \
            | grep -E '\.(hcl|tf|tfvars)$' \
            | xargs -I{} dirname {} \
            | grep -E '^(terragrunt/(dev|staging|prod|management|log-archive|security|network|third-party)/|catalog/units/)' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')

          echo "modules=${CHANGED_DIRS}" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED_DIRS" = "[]" ] || [ -z "$CHANGED_DIRS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Terragrunt Plan — parallel matrix per changed unit
  # AWS OIDC: uses TERRAFORM_PLAN_ROLE_ARN repository variable.
  # If OIDC is not yet wired (github-oidc module not yet deployed), the plan
  # step is skipped gracefully and a placeholder comment is posted to the PR.
  # Wire up: deploy catalog/units/github-oidc first, then set
  # TERRAFORM_PLAN_ROLE_ARN in repository variables.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan ${{ matrix.module }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials via OIDC
        id: aws-creds
        # OIDC auth requires github-oidc module to be deployed first.
        # Set TERRAFORM_PLAN_ROLE_ARN in repository variables to enable.
        uses: aws-actions/configure-aws-credentials@v4
        if: vars.TERRAFORM_PLAN_ROLE_ARN != ''
        continue-on-error: true
        with:
          role-to-assume: ${{ vars.TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Terragrunt Init
        if: steps.aws-creds.outcome == 'success'
        working-directory: ${{ matrix.module }}
        run: terragrunt init --non-interactive

      - name: Terragrunt Plan
        id: plan
        if: steps.aws-creds.outcome == 'success'
        working-directory: ${{ matrix.module }}
        run: |
          terragrunt plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planFile = '${{ matrix.module }}/plan_output.txt';
            const credsAvailable = '${{ steps.aws-creds.outcome }}' === 'success';

            let planOutput;
            let status;

            if (!credsAvailable) {
              planOutput = [
                'AWS credentials not yet configured.',
                '',
                'To enable plan output:',
                '1. Deploy `catalog/units/github-oidc` to provision the OIDC role.',
                '2. Set `TERRAFORM_PLAN_ROLE_ARN` as a repository variable.',
                '',
                'See SYNC_ROADMAP.md Phase 1.5 for details.'
              ].join('\n');
              status = '\u23ED\uFE0F';
            } else if (fs.existsSync(planFile)) {
              planOutput = fs.readFileSync(planFile, 'utf8');
              status = '${{ steps.plan.outcome }}' === 'success' ? '\u2705' : '\u274C';
            } else {
              planOutput = 'No plan output available (plan step may have been skipped or failed).';
              status = '\u274C';
            }

            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ${status} Terragrunt Plan: \`${{ matrix.module }}\`

            <details>
            <summary>Show plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>`
            });

  # ---------------------------------------------------------------------------
  # Summary gate — required status check
  # ---------------------------------------------------------------------------
  plan-status:
    name: Plan Status
    needs: [detect-changes, plan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check plan results
        run: |
          if [ "${{ needs.plan.result }}" = "failure" ]; then
            echo "One or more Terragrunt plans failed"
            exit 1
          fi
          echo "All plans passed (or skipped due to missing OIDC)"
