name: Terraform Validate

on:
  push:
    branches: [main, feature/terragrunt]
    paths:
      - "terraform/**"
      - "catalog/**"
      - ".tflint.hcl"
      - ".checkov.yml"
      - ".github/workflows/terraform-validate.yml"
  pull_request:
    paths:
      - "terraform/**"
      - "catalog/**"
      - ".tflint.hcl"
      - ".checkov.yml"
  workflow_dispatch:

env:
  TF_VERSION: "1.14.8"
  TFLINT_VERSION: "v0.53.0"

jobs:
  fmt-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff terraform/modules/

  # Excluded from matrix: eks (requires specific provider/module version not available in isolation),
  # karpenter (requires helm/kubernetes providers configured externally — architectural limitation)
  validate:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - hpa-defaults
          - karpenter-nodepools
          - keda
          - monitoring
          - organization
          - ram-share
          - rds
          - route53-resolver
          - scps
          - secrets
          - sso
          - transit-gateway
          - tgw-attachment
          - vpc
          - vpn-connection
          - wpa
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform init
        working-directory: terraform/modules/${{ matrix.module }}
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: terraform/modules/${{ matrix.module }}
        run: terraform validate

  # ---------------------------------------------------------------------------
  # TFLint — Terraform linter with AWS ruleset
  # Catches deprecated arguments, missing required variables, naming violations
  # that Checkov and Trivy miss. Mirrors infra/.github/workflows/terraform-checks.yml
  # ---------------------------------------------------------------------------
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint plugins
        run: tflint --init --config "$(pwd)/.tflint.hcl"

      - name: Run TFLint on terraform/modules/
        run: tflint --recursive --config "$(pwd)/.tflint.hcl" --format compact --minimum-failure-severity error --chdir terraform/modules

  # ---------------------------------------------------------------------------
  # Trivy — Infrastructure security scanning
  # Scans terraform/modules/ and catalog/ for HIGH/CRITICAL misconfigurations.
  #
  # NOTE: exit-code is set to 0 (soft-fail) because the codebase has known
  # violations that are being tracked in SYNC_ROADMAP.md Phase 1.1.
  # Switch to exit-code: 1 once known violations in terraform/modules/ and
  # catalog/ are remediated.
  # ---------------------------------------------------------------------------
  trivy-config-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy on terraform/modules/
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: terraform/modules
          severity: HIGH,CRITICAL
          exit-code: 0  # soft-fail: see comment above
          format: table

      - name: Run Trivy on catalog/
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: catalog
          severity: HIGH,CRITICAL
          exit-code: 0  # soft-fail: see comment above
          format: table

  # ---------------------------------------------------------------------------
  # Checkov CIS — CIS AWS Foundations Benchmark enforcement
  # Complements the Well-Architected custom policies in well-architected.yml.
  #
  # NOTE: soft-fail because the codebase has known violations tracked in SYNC_ROADMAP.md Phase 1.1.
  # Switch to soft_fail: false once violations in terraform/modules/ are remediated.
  # skip_check: pre-existing issues (KMS policy, DynamoDB CMK, S3 logging, S3 replication,
  #   Access Analyzer) + intentional architectural decisions (auto-shutdown Lambda patterns).
  # ---------------------------------------------------------------------------
  checkov-cis:
    name: Checkov CIS Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov CIS scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/modules
          framework: terraform
          output_format: cli
          download_external_modules: false
          soft_fail: true
          skip_check: "CKV_AWS_144,CKV_AWS_41,CKV_AWS_111,CKV_AWS_119,CKV_AWS_18,CKV_AWS_50,CKV_AWS_116,CKV_AWS_117,CKV_AWS_115,CKV_AWS_272"
