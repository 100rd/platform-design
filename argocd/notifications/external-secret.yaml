---
# ExternalSecret: argocd-notifications-secret
# Provides the Slack token for ArgoCD Notifications.
# Backed by AWS Secrets Manager path: platform/<env>/argocd/notifications-secret
#
# Prerequisites:
#   - ESO ClusterSecretStore "aws-secrets-manager" must be deployed
#     (apps/infra/cluster-secret-store)
#   - Secrets Manager entry must exist:
#     aws secretsmanager create-secret \
#       --name platform/<env>/argocd/notifications-secret \
#       --secret-string '{"slack-token":"xoxb-..."}'
#
# Pattern: follows existing ESO convention in platform-design
# (see apps/infra/observability/prometheus-stack/templates/external-secrets.yaml)
#
# SYNC_ROADMAP: Phase 3.7 — ArgoCD Slack Notifications
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: notifications
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: slack-token
      remoteRef:
        # Path follows platform-design convention: platform/<env>/<component>/<key>
        # The <env> placeholder must be substituted per-cluster (e.g. dev, staging, prod)
        key: platform/prod/argocd/notifications-secret
        property: slack-token
