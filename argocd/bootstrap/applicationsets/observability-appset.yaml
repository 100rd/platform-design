apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/100rd/platform-design.git
              revision: HEAD
              directories:
                - path: apps/infra/observability/*
          - clusters:
              selector: {}
  template:
    metadata:
      name: 'obs-{{.path.basename}}-{{.name}}'
      namespace: argocd
      labels:
        # Existing fleet-routing labels
        app.kubernetes.io/part-of: observability
        cluster-role: '{{.metadata.labels.cluster-role}}'
        env: '{{.metadata.labels.env}}'
        # ADR-0028: unified platform.* taxonomy on each generated Application.
        # system     = "observability" (the logical service boundary for the
        #              entire observability stack)
        # component  = app directory basename (tempo-stack, otel-collector, obi, etc.)
        # env        = deployment environment from cluster label
        # owner      = "platform" (observability stack owned by platform team)
        # managed-by = argocd
        platform.system: observability
        platform.component: '{{.path.basename}}'
        platform.env: '{{.metadata.labels.env}}'
        platform.owner: platform
        platform.managed-by: argocd
      annotations:
        # Sync-wave ordering for trace-lane activation (ADR-0019/ADR-0026):
        #   tempo-stack     -> wave 10  (storage backend first)
        #   otel-collector  -> wave 15  (pipeline before producers)
        #   obi             -> wave 20  (eBPF producer last)
        #   everything else -> wave  5  (infra/platform tooling)
        #
        # goTemplate note: ApplicationSet does not support dynamic per-app
        # wave assignment via template conditionals. The default wave here
        # applies to all AppSet-generated Applications. For ordered
        # bootstrapping of the trace lane use the explicit argocd-application.yaml
        # files inside each chart directory: kubectl apply -f <chart>/argocd-application.yaml
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      source:
        repoURL: https://github.com/100rd/platform-design.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: '{{.server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
