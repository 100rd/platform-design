---
# Pyrra SLO Operator — values.yaml
# ADR-0026: Pyrra chosen over Sloth for built-in SLO UI.
#
# Pyrra runs in "kubernetes" mode: the operator watches ServiceLevelObjective CRs
# cluster-wide and generates PrometheusRule objects that kube-prometheus-stack's
# Prometheus Operator picks up automatically (ruleNamespaceSelector.any: true is
# already set in prometheus-stack/values.yaml).
#
# The UI component serves SLO detail pages and error-budget burn charts at port 9099.
# It reads PrometheusRules and queries Prometheus directly.

pyrra:
  # --------------------------------------------------------------------------
  # Operator (Kubernetes CRD mode)
  # --------------------------------------------------------------------------
  operator:
    enabled: true

    # "kubernetes" mode: operator watches ServiceLevelObjective CRs in all
    # namespaces and creates matching PrometheusRule objects in the same namespace.
    # No file-system mode needed — CRs are the source of truth.
    genericRules:
      enabled: true

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Discover ServiceLevelObjective CRs across all namespaces
    # (default behaviour — kept explicit for clarity)
    genericRulesNamespaceSelector: {}

  # --------------------------------------------------------------------------
  # API / UI component
  # Pyrra ships a single binary that can run in operator-only OR api mode.
  # The "api" deployment queries Prometheus and serves the built-in SLO UI.
  # --------------------------------------------------------------------------
  api:
    enabled: true

    # Prometheus URL — kube-prometheus-stack service in the observability namespace.
    # Must match the Prometheus service name generated by kube-prometheus-stack.
    prometheusURL: "http://prometheus-stack-kube-prometheus-prometheus.observability.svc.cluster.local:9090"

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    service:
      type: ClusterIP
      port: 9099

    # Ingress disabled by default; enable per-environment via values-override.yaml.
    ingress:
      enabled: false
      # ingressClassName: alb
      # annotations:
      #   alb.ingress.kubernetes.io/scheme: internal
      #   alb.ingress.kubernetes.io/target-type: ip
      # hosts:
      #   - host: pyrra.internal.example.com
      #     paths:
      #       - path: /
      #         pathType: Prefix

  # --------------------------------------------------------------------------
  # RBAC
  # Pyrra needs ClusterRole to watch ServiceLevelObjective CRs and create/update
  # PrometheusRule objects cluster-wide.
  # --------------------------------------------------------------------------
  rbac:
    create: true

  serviceAccount:
    create: true
    name: pyrra

# --------------------------------------------------------------------------
# ServiceMonitor — let Prometheus scrape Pyrra's own /metrics
# (operator-level metrics: reconcile counts, error rates, queue depth)
# --------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  # Must match prometheusSpec.serviceMonitorSelector in prometheus-stack/values.yaml
  labels:
    prometheus: kube-prometheus
  interval: 30s
  scrapeTimeout: 10s

# --------------------------------------------------------------------------
# NetworkPolicy — see templates/networkpolicy.yaml
# --------------------------------------------------------------------------
networkPolicy:
  enabled: true
