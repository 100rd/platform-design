{{- if .Values.serviceMonitor.enabled }}
---
# ServiceMonitor: Pyrra operator self-metrics
# Lets kube-prometheus-stack Prometheus scrape Pyrra's /metrics endpoint.
# The label `prometheus: kube-prometheus` must match prometheusSpec.serviceMonitorSelector
# in apps/infra/observability/prometheus-stack/values.yaml.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pyrra
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pyrra
    app.kubernetes.io/component: slo-operator
    app.kubernetes.io/managed-by: helm
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pyrra
  endpoints:
    - port: http
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      path: /metrics
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
{{- end }}
