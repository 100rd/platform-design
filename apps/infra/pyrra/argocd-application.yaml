---
# ArgoCD Application for Pyrra SLO operator + UI
# Sync-wave 12: after kube-prometheus-stack (wave default/0) and before any
# application-level SLO dashboards.  Pyrra must be running so the Prometheus
# Operator discovers the PrometheusRules it generates.
# ADR-0026 -- SLO slice (Pyrra chosen over Sloth for built-in UI)
#
# Usage:
#   kubectl apply -f argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyrra
  namespace: argocd
  labels:
    app.kubernetes.io/name: pyrra
    app.kubernetes.io/component: slo-operator
    team: platform
  annotations:
    # Wave 12 -- after prometheus-stack (wave 0) so PrometheusRules land in a
    # cluster that already has a running Prometheus Operator.
    argocd.argoproj.io/sync-wave: "12"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/100rd/platform-design.git
    targetRevision: HEAD
    path: apps/infra/pyrra

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
