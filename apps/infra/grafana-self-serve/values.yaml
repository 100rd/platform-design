# grafana-self-serve — default values
# ALL team.* fields are REQUIRED. There are no defaults; helm lint will fail
# if any required field is missing or empty (enforced via required in templates).
#
# Override this file in example-teams/<team-slug>/values.yaml.
# See docs/self-serve-observability.md for the full onboarding guide.
# See docs/baremetal-ml-platform/self-serve-observability-baremetal.md for the
# bare-metal onboarding runbook (baremetal.enabled: true teams).
#
# ADR-0039: Self-Serve Observability
# ADR-0049: Talos foundation (self-operated control plane panels)
# ADR-0051: Cilium BGP (BGP session panels)
# ADR-0052: Rook-Ceph (Ceph health panels)
# ADR-0053: RoCE / InfiniBand GPU fabric (IB / NVLink panels)

team:
  # Human-readable team name (used in Grafana folder title and dashboard title).
  # Example: "Checkout"
  name: ""

  # Machine-safe slug — lowercase, hyphens only.
  # Used as: Grafana folder name, alert rule prefix, label values.
  # Example: "team-checkout"
  slug: ""

  # Kubernetes namespace where this team's workloads run.
  # This is also where PrometheusRule and RBAC objects are deployed.
  # Must already exist — CreateNamespace=false on the ArgoCD Application.
  # Example: "checkout"
  namespace: ""

  # platform:system value (ADR-0028 taxonomy) for this team's workloads.
  # Example: "checkout", "ml-monitoring", "auth"
  system: ""

  # platform:owner value (ADR-0028 taxonomy). Typically matches slug.
  # Example: "team-checkout"
  owner: ""

  # Deployment environment. Must be one of: production, staging, dev, sandbox.
  env: ""

  # (Optional) Grafana service-account name used for Editor access on the folder.
  # Create this service account in Grafana before deploying.
  # Leave empty to skip folder permission provisioning.
  grafanaServiceAccount: ""

  # CI/CD service account name in team.namespace that needs PrometheusRule RBAC.
  # Example: "checkout-ci"
  # Leave empty to skip RoleBinding creation.
  ciServiceAccount: ""

# ML-specific configuration. Set ml.enabled: true for ML teams.
# When enabled, extra dashboard panels for ADR-0038 drift/accuracy metrics
# are added, and ML-specific alert groups are included in the PrometheusRule.
ml:
  enabled: false

  # model_name label value to scope ML panels. Leave empty to show all models.
  # Example: "domain-adapter-hft"
  modelName: ""

  # tenant label value from ADR-0038 metric labels.
  # Example: "tenant-acme"
  tenant: ""

# Bare-metal-specific configuration. Set baremetal.enabled: true for teams
# running on the Talos bare-metal cluster (UK DCs; ADR-0049).
# When enabled:
#   - baremetal-dashboard.yaml produces a ConfigMap with Talos/IB/BGP/Ceph/etcd panels.
#   - baremetal-prometheusrule.yaml produces a PrometheusRule with bare-metal alert groups.
# When disabled (default), both templates produce no output and cloud-only teams are unaffected.
baremetal:
  enabled: false

  # Prometheus node label regex to scope Talos node metrics to this team's nodes.
  # Used in: up{job="talos-nodes", node=~"..."}, talos_version, talos_apid_request_total,
  #           node_infiniband_port_* metrics (node-exporter / Talos metrics).
  # Example: "uk-primary-gpu-.*" to scope to primary DC GPU nodes.
  nodeSelectorRegex: ".*"

  # Prometheus label selector for Cilium BGP peer addresses to scope BGP panels.
  # Example: "10\\.0\\.1\\.(1|2)" to scope to known ToR peer IPs.
  bgpPeerFilter: ".*"

  # Bare-metal-specific alert thresholds. All overridable per team in their values.yaml.
  alerts:
    # Talos: non-OK machined API responses in 5m before TalosAPIdErrors fires.
    talosMachinedErrorThreshold: "10"

    # IB fabric: IB constraint error rate per second before IBConstraintErrors fires.
    ibConstraintErrorRate: "1"

    # IB fabric: NVLink bandwidth floor (GB/s) — below this fires NVLinkBandwidthLow.
    # H100 NVSwitch peak ~900 GB/s aggregate; this floor catches severe degradation.
    nvlinkBandwidthFloorGbps: "100"

    # Cilium BGP: max announced prefixes per peer before CiliumBGPPrefixCountHigh fires.
    bgpMaxPrefixes: "200"

    # Ceph: degraded placement group count before CephPGsDegraded fires.
    cephPGDegradedThreshold: "1"

    # etcd: WAL fsync P99 latency (seconds) before EtcdHighWALFsyncLatency fires.
    # etcd recommends < 10ms; alert at 100ms to catch I/O contention early.
    etcdWALFsyncLatencySeconds: "0.1"

    # etcd: leader changes per hour before EtcdLeaderChanges fires.
    etcdLeaderChangesPerHour: "3"

    # Kubernetes API: P99 request latency (seconds) before KubeAPIServerLatencyHigh fires.
    kubeAPILatencySeconds: "1.0"

# Grafana namespace where the Grafana deployment lives and where ConfigMaps
# must be created for the sidecar to discover them.
grafanaNamespace: observability

# Prometheus datasource settings (must match apps/infra/observability/grafana-dashboards/values.yaml).
datasource:
  name: "Prometheus"
  uid: "prometheus"

# Dashboard display defaults.
defaultRefresh: "30s"
defaultTimeRange:
  from: "now-1h"
  to: "now"

# Alert thresholds — adjust per team in their values.yaml.
alerts:
  # HTTP error rate threshold (fraction). 0.05 = 5%.
  errorRateThreshold: "0.05"
  # CPU saturation threshold (fraction). 0.80 = 80%.
  cpuSaturationThreshold: "0.80"
  # Memory saturation threshold (fraction). 0.80 = 80%.
  memorySaturationThreshold: "0.80"
  # Sustained duration before availability alert fires.
  availabilityFor: "5m"
  # Sustained duration before saturation alert fires.
  saturationFor: "15m"
  # ML: drift score threshold (only used when ml.enabled: true).
  mlDriftThreshold: "0.2"
  # ML: model accuracy floor (only used when ml.enabled: true).
  mlAccuracyThreshold: "0.85"
  # ML: sustained duration before ML alert fires.
  mlAlertFor: "10m"
