# Example: team-baremetal-gpu (bare-metal GPU training team, Talos cluster, UK DCs)
# Template PR example for the GPU/ML team running on the Talos bare-metal cluster.
#
# Enables:
#   - Base service-health panels (HTTP RED metrics, CPU/memory saturation)
#   - ML drift + accuracy panels (ml.enabled: true, ADR-0038)
#   - Bare-metal supplemental panels (baremetal.enabled: true):
#       Talos node health, IB/NVLink fabric, Cilium BGP sessions, Ceph health, etcd
#
# See docs/baremetal-ml-platform/self-serve-observability-baremetal.md for the
# full onboarding runbook.
# ADR-0039: Self-Serve Observability
# ADR-0049: Talos foundation
# ADR-0051: Cilium BGP
# ADR-0052: Rook-Ceph
# ADR-0053: RoCE / InfiniBand GPU fabric

team:
  name: "Bare-Metal GPU"
  slug: "team-baremetal-gpu"
  namespace: "ml-baremetal"
  system: "ml-baremetal"
  owner: "team-baremetal-gpu"
  env: "production"
  grafanaServiceAccount: "grafana-sa-team-baremetal-gpu"
  ciServiceAccount: "baremetal-gpu-ci"

ml:
  enabled: true
  # Scope ML panels to the domain-adapter model running on the bare-metal cluster.
  modelName: "domain-adapter-hft"
  # Scope to the UK data-resident tenant.
  tenant: "tenant-uk"

# Bare-metal panel enablement.
baremetal:
  enabled: true

  # Scope Talos / IB metrics to UK primary DC GPU nodes.
  # Matches node names generated by the talos-gpu-nodepool module (ADR-0049).
  nodeSelectorRegex: "uk-primary-gpu-.*"

  # Scope BGP prefix count panels to the two ToR peers on the primary DC ToR switches.
  # Matches the LB-IPAM prefix range advertised via Cilium BGP (ADR-0051).
  bgpPeerFilter: "10\\.0\\.200\\.(1|2)"

  # Alert thresholds tuned for the GPU training team.
  alerts:
    # GPU training nodes generate sustained API traffic; allow more machined errors
    # before alerting (upgrade storms during rolling Talos upgrades).
    talosMachinedErrorThreshold: "50"

    # IB fabric: alert immediately on constraint errors (fabric quality gate).
    ibConstraintErrorRate: "0"

    # NVLink bandwidth floor for H100 NVSwitch topology.
    # Adjusted for the H100 pool; lower than peak to allow training ramp-up.
    nvlinkBandwidthFloorGbps: "200"

    # BGP: ToR is configured with max-prefix 300; alert at 250 (83% utilisation).
    bgpMaxPrefixes: "250"

    # Ceph: any degraded PG is actionable immediately for training data integrity.
    cephPGDegradedThreshold: "1"

    # etcd: dedicated NVMe for control-plane nodes; use tighter threshold.
    etcdWALFsyncLatencySeconds: "0.05"

    # etcd: leader changes in training clusters should be rare.
    etcdLeaderChangesPerHour: "2"

    # Kubernetes API: tighter for self-operated cluster.
    kubeAPILatencySeconds: "0.5"

# General alert thresholds tuned for the GPU training team.
alerts:
  errorRateThreshold: "0.05"
  # GPU training jobs consume near-100% CPU on GPU nodes; set high to avoid noise.
  cpuSaturationThreshold: "0.95"
  memorySaturationThreshold: "0.90"
  availabilityFor: "5m"
  saturationFor: "15m"
  # Drift: tighter threshold for UK production training data.
  mlDriftThreshold: "0.15"
  # Accuracy: higher floor for production model quality.
  mlAccuracyThreshold: "0.90"
  mlAlertFor: "10m"
