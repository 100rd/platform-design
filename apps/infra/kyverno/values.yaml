# Kyverno Configuration — ADR-0020
# https://kyverno.io/docs/
#
# ADR-0020: Kyverno complements Gatekeeper + PSA.
#   - Kyverno owns: verifyImages (keyless cosign), mutate securityContext,
#     generate default-deny NetworkPolicy.
#   - ValidatingAdmissionPolicy (VAP) owns: block :latest, require resource limits
#     (CEL in-process, no webhook).
#   - Gatekeeper stays — its 4 ConstraintTemplates are not replaced.
#
# W3/ADR-0020: policies graduated from Audit to Enforce after clean soak window.
# Rollback: set validationFailureAction back to Audit in verify-images.yaml,
#   validationActions back to [Audit] in block-latest-require-limits.yaml,
#   and forceFailurePolicyIgnore.enabled back to true in this file, then re-apply.

kyverno:
  enabled: true

  # CRDs are managed by the Kyverno Helm chart (installCRDs: true default).
  # Kyverno CRDs are tightly coupled with the controller version.
  crds:
    install: true

  # -----------------------------------------------------------------------
  # Admission controller — the hot path for validate / mutate / verifyImages
  # -----------------------------------------------------------------------
  admissionController:
    replicas: 3

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    container:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

    # Spread across nodes for HA; admission path must not become a SPOF
    antiAffinity:
      enabled: true

    # Allow scheduling on system-component nodes (CriticalAddonsOnly taint)
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists

    priorityClassName: system-cluster-critical

    # W3/ADR-0020: fail-closed now that policies are proven stable post-soak.
    # forceFailurePolicyIgnore disabled — webhook uses failurePolicy: Fail.
    # Rollback: set enabled back to true to restore fail-open behaviour.
    forceFailurePolicyIgnore:
      enabled: false

  # -----------------------------------------------------------------------
  # Background controller — processes generate / mutate for existing objects
  # -----------------------------------------------------------------------
  backgroundController:
    replicas: 2

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # -----------------------------------------------------------------------
  # Cleanup controller — TTL-based resource cleanup jobs
  # -----------------------------------------------------------------------
  cleanupController:
    replicas: 2

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # -----------------------------------------------------------------------
  # Reports controller — writes PolicyReport / ClusterPolicyReport objects
  # -----------------------------------------------------------------------
  reportsController:
    replicas: 2

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # -----------------------------------------------------------------------
  # Webhook configuration
  # -----------------------------------------------------------------------
  webhooksCleanup:
    enabled: true

  # config.webhooks.namespaceSelector excludes system/infra namespaces from
  # Kyverno's admission webhooks. Format per chart v3.4.x API.
  config:
    webhooks:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-public
              - kube-node-lease
              - kyverno
              - cert-manager
              - external-secrets
              - argocd

  # Image verification cache — ~60 min to keep admission latency down.
  # ADR-0020: Kyverno caches verification results to avoid Rekor round-trips
  # on every admission of the same image digest.
  features:
    policyReports:
      enabled: true
    logging:
      format: json

  # Prometheus metrics scraping
  metricsConfig:
    metricsExposure:
      enabled: true
