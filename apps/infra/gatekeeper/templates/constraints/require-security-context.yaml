---
# ConstraintTemplate: Require pods to have security context
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiresecuritycontext
  annotations:
    description: Requires pods to define a security context with runAsNonRoot
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSecurityContext
      validation:
        openAPIV3Schema:
          type: object
          properties:
            allowedCapabilities:
              type: array
              items:
                type: string
              description: "List of allowed Linux capabilities"
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiresecuritycontext

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("Container %v must set securityContext.runAsNonRoot to true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.allowPrivilegeEscalation == true
          msg := sprintf("Container %v must not allow privilege escalation", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.privileged == true
          msg := sprintf("Container %v must not run as privileged", [container.name])
        }
---
# Constraint: Apply to all namespaces except system ones
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireSecurityContext
metadata:
  name: require-security-context
  annotations:
    # Graduation (W3/ADR-0017): promoted warn -> deny after the audit-log soak
    # confirmed no legitimate workload violations remained.
    policy.qbiq.io/enforcement-graduation: "warn->deny (W3)"
spec:
  # enforcementAction: deny — graduated from warn (W3). ROLLBACK/ESCAPE: set this
  # to `dryrun` to log violations in audit without blocking admissions (safest,
  # keeps the violation signal), or to `warn` to admit with a warning. Reverting
  # is a one-line, per-constraint change with no template change.
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - gatekeeper-system
      - monitoring
      - external-secrets
