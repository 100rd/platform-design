---
# ConstraintTemplate: Require resource limits
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequireresourcelimits
  annotations:
    description: Requires containers to have CPU and memory limits defined
spec:
  crd:
    spec:
      names:
        kind: K8sRequireResourceLimits
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requireCPU:
              type: boolean
              description: "Require CPU limits"
            requireMemory:
              type: boolean
              description: "Require memory limits"
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequireresourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.requireMemory
          not container.resources.limits.memory
          msg := sprintf("Container %v must have memory limits defined", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.requireCPU
          not container.resources.limits.cpu
          msg := sprintf("Container %v must have CPU limits defined", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.requireMemory
          not container.resources.requests.memory
          msg := sprintf("Container %v must have memory requests defined", [container.name])
        }
---
# Constraint: Require resource limits for application workloads
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireResourceLimits
metadata:
  name: require-resource-limits
  annotations:
    # Graduation (W3/ADR-0017): promoted warn -> deny after the audit-log soak
    # confirmed no legitimate workload violations remained.
    policy.qbiq.io/enforcement-graduation: "warn->deny (W3)"
spec:
  # enforcementAction: deny — graduated from warn (W3). ROLLBACK/ESCAPE: set this
  # to `dryrun` to log violations in audit without blocking admissions (safest,
  # keeps the violation signal), or to `warn` to admit with a warning. Reverting
  # is a one-line, per-constraint change with no template change.
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - gatekeeper-system
      - monitoring
  parameters:
    requireCPU: false      # CPU limits can cause throttling issues
    requireMemory: true    # Memory limits are critical for OOM protection
