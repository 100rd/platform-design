apiVersion: v2
name: obi
description: >
  Grafana Beyla (OBI) — eBPF zero-code auto-instrumentation DaemonSet.
  Captures HTTP/gRPC RED signals at the kernel and exports OTLP traces to
  Tempo via the otel-collector gateway. Implements ADR-0019.
type: application
