---
# ClusterSecretStore for AWS Secrets Manager
# This should be deployed once per cluster, usually in external-secrets namespace
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.aws.region | default "eu-central-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Grafana Admin Credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: platform/observability/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: platform/observability/grafana
        property: admin-password
---
# Grafana Google OAuth Credentials
# Ported from qbiq-ai/argocd@c364c6c apps/observability, 2026-06 sync.
#
# Source: AWS Secrets Manager platform/observability/grafana-oauth
# Shape:  {"client_id":"<id>","client_secret":"<secret>"}
# Consumer: Grafana envFromSecret -> env vars
#   GF_AUTH_GENERIC_OAUTH_CLIENT_ID / GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
#   referenced by grafana.ini auth.generic_oauth (see values.yaml).
#
# Operator: create an OAuth 2.0 Client in the Google Cloud Console and register
# the redirect URI <grafana-root-url>/login/generic_oauth, then populate the
# secret:
#   aws secretsmanager put-secret-value \
#     --secret-id platform/observability/grafana-oauth \
#     --secret-string '{"client_id":"<id>","client_secret":"<secret>"}'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: grafana-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: platform/observability/grafana-oauth
        property: client_id
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: platform/observability/grafana-oauth
        property: client_secret
---
# Alertmanager Slack Webhook
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-slack-secret
    creationPolicy: Owner
  data:
    - secretKey: slack-webhook-url
      remoteRef:
        key: platform/observability/alertmanager
        property: slack-webhook-url
---
# Alertmanager PagerDuty Service Key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-pagerduty-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-pagerduty-secret
    creationPolicy: Owner
  data:
    - secretKey: service-key
      remoteRef:
        key: platform/observability/alertmanager
        property: pagerduty-service-key
