---
# ArgoCD Application for Tempo distributed tracing stack
# Sync-wave 10: Tempo must be running before otel-collector (wave 15)
# and OBI/Beyla (wave 20) send spans to it.
# ADR-0019 / ADR-0026 -- trace lane activation
#
# Usage:
#   kubectl apply -f argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: tempo-stack
    app.kubernetes.io/component: tracing
    team: platform
  annotations:
    # Wave 10 -- Tempo (storage backend) before collector (wave 15) and OBI (wave 20)
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/100rd/platform-design.git
    targetRevision: HEAD
    path: apps/infra/observability/tempo

    helm:
      valueFiles:
        - values.yaml
        - values-override.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
